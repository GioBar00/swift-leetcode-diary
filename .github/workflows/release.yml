name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'           # stable:     v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-*'          # prerelease: v1.2.3-beta.1

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog for this release
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"

          # Determine if this is a prerelease
          if [[ "$TAG" == *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            
            # Generate changelog body for this tag only (since last tag) using standard history
            git-cliff \
              --config .github/cliff.toml \
              --latest \
              --strip all \
              --output release_notes.md
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            
            # Fetch origin dev so we have the granular history
            git fetch origin dev
            
            # Find the previous stable tag (ignoring prerelease tags with dashes) in the tag's history
            PREV_STABLE_TAG=$(git describe --tags --abbrev=0 --exclude='*-*' "$TAG^" 2>/dev/null || echo "")
            echo "Previous stable tag: $PREV_STABLE_TAG"
            
            if [ -z "$PREV_STABLE_TAG" ]; then
              # If no previous stable tag, generate changelog up to dev branch
              git-cliff \
                --config .github/cliff.toml \
                --strip all \
                --output release_notes.md \
                "origin/dev"
            else
              # Generate changelog for the range PREV_STABLE_TAG..origin/dev
              git-cliff \
                --config .github/cliff.toml \
                --strip all \
                --output release_notes.md \
                "$PREV_STABLE_TAG..origin/dev"
            fi
          fi

          echo "Generated release notes:"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          prerelease: ${{ steps.changelog.outputs.is_prerelease }}
          draft: false
