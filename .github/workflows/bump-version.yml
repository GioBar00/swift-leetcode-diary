name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'What type of bump to perform (use major, minor, patch to start a new cycle; use same or label to promote/increment)'
        required: true
        type: choice
        default: same
        options:
          - same
          - major
          - minor
          - patch
          - alpha
          - beta
          - rc
      prerelease_label:
        description: 'Target label (only evaluated when starting a new cycle. If none, inherits active prerelease label or defaults to alpha if starting from stable)'
        required: false
        type: choice
        default: none
        options:
          - none
          - alpha
          - beta
          - rc

permissions:
  contents: write

jobs:
  bump:
    name: Bump Prerelease & Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Validate Branch Context
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$BRANCH" != "dev" ]; then
            echo "❌ Error: The 'bump-version' workflow can only be run on the 'dev' branch. Stable releases are created automatically on main when dev is merged."
            exit 1
          fi
          echo "✅ Branch validated: $BRANCH"

      - name: Compute next version
        id: version
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump_type }}"
          PRERELEASE_LABEL="${{ github.event.inputs.prerelease_label }}"

          chmod +x .github/scripts/bump-version.sh
          NEXT=$(.github/scripts/bump-version.sh "$BUMP_TYPE" "$PRERELEASE_LABEL")

          echo "Computed next prerelease version: $NEXT"
          echo "next_tag=$NEXT" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          TAG="${{ steps.version.outputs.next_tag }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Set remote URL to explicitly use the PAT token
          git remote set-url origin "https://x-access-token:${{ secrets.RELEASE_PAT }}@github.com/${{ github.repository }}.git"
          
          git tag "$TAG" -m "chore: prerelease $TAG"
          git push origin "$TAG"
          echo "✅ Prerelease tag created and pushed: $TAG"
