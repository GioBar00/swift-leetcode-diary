name: PR Title Lint

on:
  pull_request:
    branches: [ main, dev ]
    types: [ opened, edited, synchronize, reopened ]

jobs:
  lint-title:
    name: Lint PR Title
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install commitlint
        run: |
          npm install --save-dev @commitlint/config-conventional @commitlint/cli

      - name: Lint PR Title
        run: |
          echo "${{ github.event.pull_request.title }}" | npx commitlint --config .github/commitlint.config.mjs --verbose

