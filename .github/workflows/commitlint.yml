name: PR Title Lint

on:
  pull_request:
    branches: [ main, dev ]
    types: [ opened, edited, synchronize, reopened ]

permissions:
  pull-requests: read

jobs:
  lint-title:
    name: Lint PR Title
    runs-on: ubuntu-latest

    steps:
      - name: Lint PR Title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            perf
            revert
            ci
            build
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.
