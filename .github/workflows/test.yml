name: Swift CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ dev ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Swift
      if: matrix.os == 'ubuntu-latest'
      uses: SwiftyLab/setup-swift@latest
      with:
        swift-version: '6.0'

    - name: Print Swift version
      run: swift --version

    - name: Build Package
      run: swift build -v

    - name: Run Tests
      run: swift test -v
