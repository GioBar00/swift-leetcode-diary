# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
---\n
"""
body = """
{% if version %}\
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/GioBar00/swift-leetcode-diary/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = """
{% for release in releases %}\
{% if release.version %}\
[{{ release.version }}]: https://github.com/GioBar00/swift-leetcode-diary/releases/tag/{{ release.version }}
{% else %}\
[unreleased]: https://github.com/GioBar00/swift-leetcode-diary/compare/{{ releases | last | get(key="version") }}...HEAD
{% endif %}\
{% endfor %}
"""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = ".*\\[skip.*", skip = true },

  { message = "^feat",     group = "✨ Features" },
  { message = "^fix",      group = "🐛 Bug Fixes" },
  { message = "^perf",     group = "⚡ Performance" },
  { message = "^refactor", group = "♻️ Refactors" },
  { message = "^docs",     group = "📝 Documentation" },
  { message = "^test",     group = "🧪 Tests" },
  { message = "^chore",    group = "🔧 Maintenance" },
  { message = "^ci",       group = "👷 CI" },
  { message = "^build",    group = "🏗️ Build" },
  { message = "^revert",   group = "⏪ Reverts" },
  { message = "^.*",       skip = true },  # skip non-conventional
]
filter_commits = false
tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
